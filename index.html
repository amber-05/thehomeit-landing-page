<!doctype html>
<html lang="en">

    <!-- ✅ Canonical Tag (prevents duplicate content issues) -->

    <title>Homeit — Smart Society Management</title>
    <meta name="description" content="Homeit is a modern society management platform with visitor management, digital billing, emergency response, amenity booking, and community tools — all in one app." />

    <meta name="author" content="Homeit" />
    <meta name="robots" content="index, follow" />

    <!-- ✅ Open Graph (Facebook, LinkedIn, WhatsApp previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thehomeit.com/" />
    <meta property="og:title" content="Homeit — Smart Society Management" />

    <meta property="og:site_name" content="Homeit" />
    <meta property="og:locale" content="en_IN" />

    <!-- ✅ Twitter Card (Twitter/X previews) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://thehomeit.com/" />
    <meta name="twitter:title" content="Homeit — Smart Society Management" />
    <meta name="twitter:description" content="Manage your housing society smarter. Visitor management, digital billing, emergency alerts and more." />
    <meta name="twitter:image" content="https://thehomeit.com/og-image.png" />

    <!-- ✅ Favicon -->

    <!-- ✅ Theme colour (browser address bar on mobile) -->

      "name": "Homeit",

        "@type": "Offer",
        "priceCurrency": "INR",

      },
      "publisher": {
        "@type": "Organization",
        "name": "Homeit",
        "url": "https://thehomeit.com",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "support@thehomeit.com",
          "contactType": "customer support"
        }
      }
    }
